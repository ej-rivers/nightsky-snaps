name: Build and Deploy APOD Site

on:
  schedule:
    # 10:00 UTC = 06:00 ET (DST) / 05:00 ET (standard).
    # We aim early because GitHub Actions schedules drift by 1-3h under load.
    # We also self-trigger from the local machine at ~07:00 ET as a safety net
    # (see cron "NightSky Snaps - site build trigger 07:00am"), so by the time
    # the FB primary cron fires at 08:30 ET the site is reliably up to date.
    #
    # Constraints:
    #   - Must be AFTER NASA APOD publishes (~05:00 ET, occasionally slips).
    #   - Should land before the FB cron at 08:30 ET that fetches this site.
    - cron: "0 10 * * *"
  workflow_dispatch:
  push:
    branches: [ master, main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build site
        env:
          ALLOW_MISSING_TODAY: '1'
        run: |
          if [ -f package-lock.json ]; then
            npm ci --prefer-offline --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
