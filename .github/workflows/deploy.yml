name: Build and Deploy APOD Site

on:
  schedule:
    # 11:00 UTC = 07:00 ET (DST) / 06:00 ET (standard).
    # Constraints:
    #   - Must be AFTER NASA APOD publishes (~05:00 ET, occasionally slips).
    #   - Must be BEFORE the consumer FB cron at 08:30 ET that fetches this site.
    # This window gives ~2h after APOD publish and ~90min before the FB cron,
    # which works in both DST and standard time. (Previous 06:15 UTC was too
    # early; 13:00 UTC was after the FB primary cron during DST.)
    - cron: "0 11 * * *"
  workflow_dispatch:
  push:
    branches: [ master, main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build site
        # No `|| true` on npm ci — if dependencies can't install, the build
        # should fail loudly. generate.mjs itself also exits non-zero when
        # today's APOD entry is missing, so a stale deploy can't masquerade
        # as a successful run.
        run: |
          if [ -f package-lock.json ]; then
            npm ci --prefer-offline --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
